services:
  - type: web
    name: taskflow-auth
    runtime: docker
    dockerContext: ./auth
    dockerfilePath: ./auth/Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: taskflow-tasks
    runtime: docker
    dockerContext: ./tasks
    dockerfilePath: ./tasks/Dockerfile
    envVars:
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        sync: false

  - type: web
    name: taskflow-gateway
    runtime: docker
    dockerContext: ./gateway
    dockerfilePath: ./gateway/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: AUTH_SERVICE
        sync: false
      - key: TASKS_SERVICE
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
